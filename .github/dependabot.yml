# Dependabot - aggiornamenti settimanali per automazioni GitHub.
#
# SyncBay non ha ancora package applicativi. Quando verra creato lo scaffold,
# aggiungere qui anche l'ecosistema npm allineato al package manager scelto.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:20"
      timezone: Europe/Rome
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
